<!-- LOADING -->
<div *ngIf="loading()" class="alert alert-info">
  Cargando usuarios...
</div>

<!-- ERROR -->
<div *ngIf="apiError()" class="alert alert-danger">
  {{ apiError() }}
</div>

<!-- LISTADO -->
<div class="row" *ngIf="users().length > 0">

  <div class="col-md-4 mb-3" *ngFor="let user of users()">
    <app-user-card [user]="user" (delete)="deleteUser($event)"></app-user-card>
  </div>

</div>
